services:
  portfolio:
    build: .

    container_name: portfolio

    restart: unless-stopped

    networks:
      - web

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.portfolio.rule=Host(`techymayank.com`) || Host(`www.techymayank.com`)"

      - "traefik.http.routers.portfolio.entrypoints=web"

      - "traefik.http.services.portfolio.loadbalancer.server.port=80"

networks:
  web:
    external: true
