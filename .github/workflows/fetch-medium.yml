name: Fetch Medium Posts

on:
  schedule:
    # Every 6 hours: at 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch-medium:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the JSON file back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Medium RSS and save as JSON
        run: |
          RSS_URL="https://medium.com/feed/@mayankrajputofficial"
          echo "Fetching RSS feed from Medium..."
          curl -fsSL "$RSS_URL" -o medium-feed.xml

          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import json, re
          from datetime import datetime

          tree = ET.parse('medium-feed.xml')
          root = tree.getroot()

          all_items = []
          work_items = []
          personal_items = []

          for item in root.findall('.//item'):
              title = item.findtext('title', '').strip()
              link  = item.findtext('link', '').strip()
              pub   = item.findtext('pubDate', '').strip()
              desc  = item.findtext('description', '').strip()
              cats  = [c.text.strip() for c in item.findall('category') if c.text]
              excerpt = re.sub(r'<[^>]+>', '', desc)[:200].strip()
              try:
                  dt = datetime.strptime(pub[:25].strip(), '%a, %d %b %Y %H:%M:%S')
                  formatted = dt.strftime('%-d %b %Y')
              except Exception:
                  formatted = pub[:16]

              if not title or not link:
                  continue

              entry = {
                  'title':   title,
                  'url':     link,
                  'date':    formatted,
                  'rawDate': pub,
                  'excerpt': excerpt,
                  'tags':    cats[:4],
              }
              all_items.append(entry)
              cats_lower = [c.lower() for c in cats]
              if 'personal' in cats_lower:
                  personal_items.append(entry)
              elif 'work' in cats_lower or not cats:
                  work_items.append(entry)
              else:
                  work_items.append(entry)

          now = datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

          for fname, items in [('medium-posts.json', all_items),
                                ('medium-work.json', work_items),
                                ('medium-personal.json', personal_items)]:
              with open(fname, 'w') as f:
                  json.dump({'fetchedAt': now, 'count': len(items), 'posts': items}, f, indent=2, ensure_ascii=False)
              print(f"Saved {len(items)} posts to {fname}")
          PYEOF

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add medium-posts.json medium-work.json medium-personal.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update Medium posts"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to VM
        if: steps.commit.outputs.changed == 'true'
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd $HOME/portfoliowebsite
            git pull
            docker stop portfolio || true
            docker rm portfolio || true
            docker build -t portfolio-app .
            docker run -d -p 8080:80 --restart always --name portfolio portfolio-app
